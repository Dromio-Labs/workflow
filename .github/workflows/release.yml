name: Release

on:
  workflow_dispatch:
    inputs:
      action:
        description: Release action
        required: true
        type: choice
        options:
          - rehearse
          - publish-next
          - verify-next
          - repair-next-tags
          - promote-latest

permissions:
  contents: read

concurrency:
  group: workflow-release
  cancel-in-progress: false

jobs:
  rehearse:
    if: inputs.action == 'rehearse'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: make setup
      - run: make release-rehearse

  publish-next:
    if: inputs.action == 'publish-next'
    environment: npm-prerelease
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: make setup
      - run: make release-publish-next
        env:
          DROMIO_RELEASE_CONFIRM: publish-next
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  verify-next:
    if: inputs.action == 'verify-next'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: make setup
      - run: make release-verify-next

  repair-next-tags:
    if: inputs.action == 'repair-next-tags'
    environment: npm-prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: make setup
      - run: make release-repair-next-tags
        env:
          DROMIO_RELEASE_CONFIRM: repair-next-tags
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  promote-latest:
    if: inputs.action == 'promote-latest'
    environment: npm-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: make setup
      - run: make release-promote-latest
        env:
          DROMIO_RELEASE_CONFIRM: promote-latest
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
